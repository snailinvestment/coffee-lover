<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="一豆一世界 — 有温度的咖啡知识平台。从零开始学咖啡，历史、品种、品鉴、冲泡、工具。">
  <title>一豆一世界</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- 导航栏 -->
  <nav class="navbar" id="navbar">
    <div class="nav-inner">
      <a href="#" class="nav-brand" data-route="home">
        <span class="nav-brand-icon">☕</span>
        <span class="nav-brand-text">一豆一世界</span>
      </a>
      <button class="nav-toggle" id="navToggle" aria-label="菜单">☰</button>
      <div class="nav-links" id="navLinks">
        <a href="#" data-route="category/history">咖啡历史</a>
        <a href="#" data-route="category/beans">咖啡豆世界</a>
        <a href="#" data-route="category/tasting">咖啡品鉴</a>
        <a href="#" data-route="category/brewing">冲泡指南</a>
        <a href="#" data-route="category/tools">工具百科</a>
      </div>
      <div class="nav-search" id="navSearch">
        <input type="text" id="searchInput" placeholder="搜索文章..." autocomplete="off">
        <button class="nav-search-btn" id="searchBtn">🔍</button>
        <button class="theme-toggle" id="themeToggle" aria-label="切换主题" title="日间/夜间模式">🌙</button>
        <button class="auth-btn" id="authBtn" title="登录">登录</button>
      </div>
    </div>
  </nav>

  <!-- 主内容区 -->
  <main id="app">
    <div class="loading-skeleton">
      <div class="skeleton-hero"></div>
      <div class="skeleton-cards">
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
      </div>
    </div>
  </main>

  <!-- 页脚 -->
  <footer class="footer">
    <div class="footer-inner">
      <div class="footer-col">
        <h4>一豆一世界</h4>
        <p>一个有温度的咖啡知识平台。从一颗豆子开始，探索大千世界。</p>
      </div>
      <div class="footer-col">
        <h4>快速导航</h4>
        <a href="#" data-route="category/history">咖啡历史</a>
        <a href="#" data-route="category/beans">咖啡豆世界</a>
        <a href="#" data-route="category/brewing">冲泡指南</a>
        <a href="#" data-route="category/tools">工具百科</a>
      </div>
      <div class="footer-col">
        <h4>关于本站</h4>
        <p>内容持续更新中。如有咖啡相关问题或合作意向，欢迎联系。</p>
      </div>
    </div>
    <div class="footer-bottom">
      &copy; 2026 咖啡爱好者 — 一豆一世界
    </div>
  </footer>

  <!-- 移动端底部导航 -->
  <nav class="mobile-tabs" id="mobileTabs">
    <a href="#" data-route="home" class="mobile-tab active" onclick="navigate('home');return false">
      <span class="mobile-tab-icon">🏠</span>
      <span class="mobile-tab-label">首页</span>
    </a>
    <a href="#" data-route="category/beans" class="mobile-tab" onclick="navigate('category/beans');return false">
      <span class="mobile-tab-icon">🫘</span>
      <span class="mobile-tab-label">咖啡豆</span>
    </a>
    <a href="#" data-route="category/brewing" class="mobile-tab" onclick="navigate('category/brewing');return false">
      <span class="mobile-tab-icon">🫗</span>
      <span class="mobile-tab-label">冲泡</span>
    </a>
    <a href="#" data-route="category/tasting" class="mobile-tab" onclick="navigate('category/tasting');return false">
      <span class="mobile-tab-icon">👃</span>
      <span class="mobile-tab-label">品鉴</span>
    </a>
    <a href="#" data-route="category/tools" class="mobile-tab" onclick="navigate('category/tools');return false">
      <span class="mobile-tab-icon">🔧</span>
      <span class="mobile-tab-label">工具</span>
    </a>
  </nav>

  <script src="data/articles_data.js" defer></script>
  <script src="js/app.js" defer></script>
  <script src="js/supabase.js"></script>
</body>
</html>
